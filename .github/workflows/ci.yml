name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: container-registry.oracle.com/graalvm/native-image:25-ol8

    steps:
      - name: Install container prerequisites
        shell: bash
        run: microdnf install -y findutils git gzip tar

      - name: Checkout source
        uses: actions/checkout@v6

      - name: Run build
        run: ./gradlew --no-daemon build

      - name: Run native tests
        run: ./gradlew --no-daemon nativeTest

      - name: Run native compile smoke test
        shell: bash
        run: ./gradlew --no-daemon nativeCompile
