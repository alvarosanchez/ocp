name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Oracle GraalVM for JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: "graalvm"
          java-version: "25"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Run build
        run: ./gradlew --no-daemon build

      - name: Run native tests
        run: ./gradlew --no-daemon nativeTest

  native-container-smoke:
    runs-on: ubuntu-latest
    container: container-registry.oracle.com/graalvm/native-image:25-ol8

    steps:
      - name: Install container prerequisites
        shell: bash
        run: microdnf install -y findutils git gzip tar

      - name: Checkout source
        uses: actions/checkout@v6

      - name: Compute Gradle inputs hash for smoke job
        id: gradle-hash
        shell: bash
        run: |
          set -euo pipefail
          hash=$(find . -type f \( -name '*.gradle' -o -name '*.gradle.kts' -o -name 'gradle-wrapper.properties' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | awk '{print $1}')
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"

      - name: Cache Gradle dependencies for smoke job
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ steps.gradle-hash.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run native compile smoke test
        shell: bash
        run: ./gradlew --no-daemon nativeCompile
